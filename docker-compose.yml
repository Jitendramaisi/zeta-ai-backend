version: '3.8'

services:
  zeta-ai-backend:
    build: .
    container_name: zeta-ai-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=sqlite:///zeta_ai.db
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5000
    volumes:
      - ./logs:/app/logs
      - ./zeta_ai.db:/app/zeta_ai.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
